<mat-card id="navigation">
  <div class="row">
    <div class="col-md-1">
        <img src="https://avatars0.githubusercontent.com/u/46693979?s=200&v=4"  width="70px" height="70px" (click)="onHome()"/>
    </div>
    <div class="col-md-5">
      <h3>Streamline</h3>
    </div>
    <div class="col-md-6">
        <button mat-button [matMenuTriggerFor]="menu" id="menu">Menu</button>
    </div>
  </div>
  <mat-menu #menu="matMenu">
    <button mat-menu-item *ngIf="!auth.isLoggedIn()" (click)="onLogin()"> Login</button>
    <button mat-menu-item *ngIf="!auth.isLoggedIn()" (click)="onRegister()">Register</button>
    <button mat-menu-item *ngIf="auth.isLoggedIn()" (click)="onSettings()">Settings</button>
    <button mat-menu-item *ngIf="auth.isLoggedIn()" (click)="onTeams()">Teams</button>
    <button mat-menu-item *ngIf="auth.isLoggedIn()" (click) ="onLogout()">Logout</button>
  </mat-menu>
</mat-card>
