<mat-card class="mat-elevation-z0">
  <form class="form" id="form">
    <mat-form-field>
      <h4>Name</h4>
      <input matInput [formControl]="nameFormControl" type="text">
    </mat-form-field>

    <mat-form-field class="example-full-width">
      <h4>Email</h4>
      <input matInput [formControl]="emailFormControl" [errorStateMatcher]="matcher">
      <mat-hint>Make sure to check for typos.</mat-hint>
      <mat-error *ngIf="emailFormControl.hasError('email') && !emailFormControl.hasError('required')">
        Please enter a valid email address
      </mat-error>
      <mat-error *ngIf="emailFormControl.hasError('required')">
        Email is <strong>required</strong>
      </mat-error>
    </mat-form-field>

    <mat-form-field>
      <h4>Password</h4>
      <input matInput [formControl]="passwordFormControl" type="password">
    </mat-form-field>

    <mat-form-field>
        <h4>Confirm password</h4>
        <input matInput [formControl]="confirmPasswordFormControl" type="password">
      </mat-form-field>

    <div class="row" id="form-buttons">
      <div class="col-sm-6">
        <button mat-button id="submit" (click)="onSubmit()">Submit</button>
      </div>
      <div class="col-sm-6">
        <button mat-button id="cancel" (click)="onCancel()">Cancel</button>
      </div>
    </div>
  </form>
</mat-card>
