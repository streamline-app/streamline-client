<h1 mat-dialog-title>Remove Team Member</h1>
<div mat-dialog-content class="diag_box">
    <p>Are you sure you want to remove this team member?</p>
</div>
<div mat-dialog-actions style="float: right;" class="button_box">
    <button mat-button style="background-color: lightcoral;" (click)="yes()">Remove</button>
    <button mat-button style="background-color: lightgreen;" (click)="no()">Cancel</button>
</div>
