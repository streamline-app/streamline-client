<h1 mat-dialog-title>Create Tag</h1>
<div mat-dialog-content class="diag_box">
    <mat-form-field>
        <mat-label>Tag Name</mat-label>
        <input matInput type="text" matInput [(ngModel)]="data.name" required>
        <mat-hint>What do you want to call this tag?</mat-hint>
    </mat-form-field>
    <mat-form-field>
        <mat-label>Description</mat-label>
        <textarea matInput type="text" [(ngModel)]="data.desc"></textarea>
    </mat-form-field>
    <mat-form-field>
        <mat-label>Change Color</mat-label>
        <input matInput type="color" [(ngModel)]="data.color">
    </mat-form-field>
</div>
<div mat-dialog-actions class="button_box">
    <button mat-button (click)="createTag()">Create</button>
    <button mat-button (click)="closeDiag()">Cancel</button>
</div>
