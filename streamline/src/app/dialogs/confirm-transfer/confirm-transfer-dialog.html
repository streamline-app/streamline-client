<h1 mat-dialog-title>Transfer Team Ownership</h1>
<div mat-dialog-content class="diag_box">
    <p>Are you sure you want to transfer ownership of this team to the specified user?</p>
</div>
<div mat-dialog-actions style="float: right;" class="button_box">
    <button mat-button style="background-color: lightgreen;" (click)="yes()">Yes</button>
    <button mat-button style="background-color: lightcoral;" (click)="no()">No</button>
</div>
