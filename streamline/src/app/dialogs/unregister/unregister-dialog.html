<h1 mat-dialog-title>Are you sure you want to delete your account?</h1>
<div mat-dialog-content>
  <p>This action cannot be reverted.</p>
</div>
<div mat-dialog-actions>
  <button mat-button style="background: lightseagreen" (click)="onNoClick()">No</button>
  <button mat-button style="background: lightcoral"(click)="onYesClick()" cdkFocusInitial>Yes</button>
</div>
