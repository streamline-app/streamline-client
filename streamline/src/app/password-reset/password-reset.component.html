<mat-card class="mat-elevation-z0">
  <h3>Reset Password</h3>
  <hr />
  <form class="form">
    <p id="info">To reset your password, we need an email adress that we can verify you with.<br>
      <br>Please enter one below and wait for an email from us in your inbox.</p>
    <mat-form-field class="example-full-width">
        <h4>Email</h4>
        <input matInput [formControl]="emailFormControl"
                [errorStateMatcher]="matcher">
        <mat-hint>Make sure to check for typos.</mat-hint>
        <mat-error *ngIf="emailFormControl.hasError('email') && !emailFormControl.hasError('required')">
          Please enter a valid email address
        </mat-error>
        <mat-error *ngIf="emailFormControl.hasError('required')">
          Email is <strong>required</strong>
        </mat-error>
      </mat-form-field>

      <div class="row" id="form-buttons">
          <div class="col-sm-6">
            <button mat-button id="submit" (click)="onSubmit()">Submit</button>
          </div>
          <div class="col-sm-6">
            <button mat-button id="cancel" (click)="onCancel()">Cancel</button>
          </div>
      </div>
  </form>

</mat-card>
