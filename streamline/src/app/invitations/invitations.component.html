<mat-card>
      <div class="row">
          <div class="col-md-8">
              <h1 class="header">Team Invitations</h1>
          </div>
          <div class="col-md-4">
              <button id="back" mat-button (click)="onBack()">Go Back</button>
          </div>  
        </div>
  <hr />
  <mat-card-content>
    <p id="info">Accept or decline pending team invitations here.</p>
    <table mat-table [dataSource]="invitations" class="mat-elevation-z0" id="invitationTable">
      <ng-container matColumnDef="sender">
          <th mat-header-cell *matHeaderCellDef> Sender </th>
          <td mat-cell *matCellDef="let element"> {{element.sender}} </td>
      </ng-container>
      <ng-container matColumnDef="team">
          <th mat-header-cell *matHeaderCellDef> Team </th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>
      <ng-container matColumnDef="senderEmail">
          <th mat-header-cell *matHeaderCellDef> Contact Email</th>
          <td mat-cell *matCellDef="let element"> {{element.senderEmail}} </td>
      </ng-container>
      <ng-container matColumnDef="message">
          <th mat-header-cell *matHeaderCellDef> Message </th>
          <td mat-cell *matCellDef="let element"> {{element.message}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let element"> 
            <button mat-button (click)="onAccept(element.id)" id="accept">Accept</button>
            <button mat-button (click)="onDecline(element.id)" id="decline">Decline</button>
          </td>
      </ng-container>
  

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
