<mat-sidenav-container class="container">
  <mat-sidenav-content class="main_box">
    <button mat-stroked-button (click)="createTag()">Create Tag</button>

    <div class="tag_box">
      <ul class="tags">
        <li *ngFor="let tag of tags" [class.selected]="tag === selectedTag" (click)="onSelect(tag)">
          <span class="badge">{{tag.id}}</span> {{tag.name}}
        </li>
      </ul>
    </div>

  </mat-sidenav-content>

  <mat-sidenav #sidenav [(opened)]="opened" class="sidebar" mode="side" position="end">
    <button mat-stroked-button (click)="sidenav.toggle()">
      <mat-icon>arrow_right_alt</mat-icon>
    </button>
    <h2>{{selectedTag.name}} Details</h2>
    <mat-divider></mat-divider>
    <h4 class="detail_H4">Description</h4>
    <div class="desc">
      <p>{{selectedTag.description}}</p>
    </div>
  </mat-sidenav>
</mat-sidenav-container>
